# Render Configuration
# Documentation: https://render.com/docs/blueprint-spec

version: "1"

services:
  # Backend Service
  - type: web
    name: ai-media-editor-backend
    env: node
    region: oregon
    plan: starter
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        fromDatabase:
          name: ai-media-editor-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: redis
          name: ai-media-editor-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: ai-media-editor-redis
          property: port
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: S3_BUCKET_UPLOADS
        sync: false
      - key: S3_BUCKET_EXPORTS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: STABILITY_API_KEY
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: LOG_LEVEL
        value: info

  # Frontend Service (Static Site)
  - type: static
    name: ai-media-editor-frontend
    env: static
    region: oregon
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ai-media-editor-backend
          property: url
      - key: VITE_STRIPE_PUBLIC_KEY
        sync: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: 1; mode=block

  # Redis Service
  - type: redis
    name: ai-media-editor-redis
    region: oregon
    plan: starter
    maxmemoryPolicy: noeviction

databases:
  - name: ai-media-editor-db
    databaseName: ai_media_editor
    user: ai_media_editor_user
    plan: starter
    region: oregon
